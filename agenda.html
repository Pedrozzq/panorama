<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Oficial de Eventos - Maia Produtor</title>

  <style>
    :root {
      --bg: #030303;
      --bg-2: #0a0002;
      --red: #ff0033;
      --red-2: #ff174f;
      --red-soft: rgba(255, 0, 51, 0.18);
      --red-border: rgba(255, 0, 51, 0.38);

      --text: #ffffff;
      --muted: #b8a7aa;
      --border: rgba(255, 255, 255, 0.13);
      --card: rgba(255, 255, 255, 0.07);
      --radius: 24px;
      --shadow: 0 26px 90px rgba(0, 0, 0, 0.65);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 0, 51, 0.28), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(255, 0, 51, 0.18), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(255, 0, 51, 0.20), transparent 38%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 0, 51, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 51, 0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, black, transparent 90%);
      pointer-events: none;
      z-index: -5;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0%, rgba(255, 0, 51, 0.08) 45%, transparent 58%),
        radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 100% 100%, 26px 26px;
      pointer-events: none;
      z-index: -4;
      animation: bgMove 12s linear infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0 0, 0 0;
      }

      100% {
        background-position: 220px 0, 120px 120px;
      }
    }

    .stage-light {
      position: fixed;
      width: 420px;
      height: 620px;
      top: -120px;
      background: linear-gradient(to bottom, rgba(255, 0, 51, 0.24), transparent 72%);
      filter: blur(4px);
      opacity: 0.5;
      transform-origin: top center;
      pointer-events: none;
      z-index: -3;
      animation: lightSwing 7s ease-in-out infinite;
    }

    .stage-light.left {
      left: 4%;
      transform: rotate(22deg);
    }

    .stage-light.right {
      right: 4%;
      transform: rotate(-22deg);
      animation-delay: -3.5s;
    }

    @keyframes lightSwing {
      0%, 100% {
        transform: rotate(20deg);
        opacity: 0.35;
      }

      50% {
        transform: rotate(-12deg);
        opacity: 0.65;
      }
    }

    .scene-3d {
      position: fixed;
      inset: 0;
      perspective: 900px;
      pointer-events: none;
      overflow: hidden;
      z-index: -2;
    }

    .float-card {
      position: absolute;
      width: 150px;
      height: 78px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03)),
        linear-gradient(135deg, rgba(255,0,51,0.85), rgba(70,0,14,0.75));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 30px 70px rgba(255, 0, 51, 0.22),
        inset 0 0 24px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      transform-style: preserve-3d;
      animation: floatTicket 10s ease-in-out infinite;
      opacity: 0.42;
    }

    .float-card::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 18px;
      height: 2px;
      background: rgba(255,255,255,0.42);
      box-shadow: 0 18px 0 rgba(255,255,255,0.25);
    }

    .float-card::after {
      content: attr(data-text);
      position: absolute;
      right: 16px;
      bottom: 12px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1.2px;
      color: white;
      text-shadow: 0 0 18px rgba(255,255,255,0.35);
    }

    .float-card.one {
      left: 4%;
      top: 20%;
      animation-delay: -1s;
    }

    .float-card.two {
      right: 7%;
      top: 28%;
      width: 170px;
      height: 88px;
      animation-delay: -4s;
    }

    .float-card.three {
      left: 10%;
      bottom: 14%;
      width: 130px;
      height: 72px;
      animation-delay: -7s;
    }

    .float-card.four {
      right: 12%;
      bottom: 18%;
      animation-delay: -2.5s;
    }

    @keyframes floatTicket {
      0%, 100% {
        transform: translate3d(0, 0, 0) rotateX(16deg) rotateY(-20deg) rotateZ(-6deg);
      }

      50% {
        transform: translate3d(18px, -38px, 90px) rotateX(-10deg) rotateY(24deg) rotateZ(7deg);
      }
    }

    .cube {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      border: 1px solid rgba(255, 0, 51, 0.42);
      background: rgba(255, 0, 51, 0.08);
      box-shadow:
        0 0 42px rgba(255, 0, 51, 0.26),
        inset 0 0 22px rgba(255, 0, 51, 0.18);
      transform-style: preserve-3d;
      animation: cubeSpin 12s linear infinite;
      opacity: 0.4;
    }

    .cube.one {
      left: 46%;
      top: 14%;
    }

    .cube.two {
      right: 26%;
      bottom: 8%;
      width: 54px;
      height: 54px;
      animation-delay: -5s;
    }

    @keyframes cubeSpin {
      0% {
        transform: rotateX(0deg) rotateY(0deg) translateY(0);
      }

      50% {
        transform: rotateX(180deg) rotateY(140deg) translateY(-28px);
      }

      100% {
        transform: rotateX(360deg) rotateY(360deg) translateY(0);
      }
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 60px;
      position: relative;
      z-index: 2;
    }

    .top-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      margin-bottom: 24px;
      border-radius: 999px;
      background: rgba(255, 0, 51, 0.13);
      border: 1px solid var(--red-border);
      color: #fff1f3;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 900;
      letter-spacing: 0.3px;
      box-shadow:
        0 18px 50px rgba(255, 0, 51, 0.16),
        inset 0 0 24px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 rgba(255,0,51,0.8);
      animation: pulse 1.7s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255,0,51,0.8);
      }

      70% {
        box-shadow: 0 0 0 12px rgba(255,0,51,0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255,0,51,0);
      }
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
    }

    .calendar-card,
    .event-panel {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.035)),
        rgba(0, 0, 0, 0.52);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .calendar-card::before,
    .event-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 0, 51, 0.18), transparent);
      transform: translateX(-130%);
      animation: shine 7s infinite;
      pointer-events: none;
    }

    .calendar-card::after,
    .event-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at top right, rgba(255, 0, 51, 0.22), transparent 35%);
      pointer-events: none;
    }

    @keyframes shine {
      0% {
        transform: translateX(-130%);
      }

      45%, 100% {
        transform: translateX(130%);
      }
    }

    .calendar-card {
      padding: 24px;
    }

    .calendar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    .month-title {
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: -0.8px;
      text-shadow: 0 0 34px rgba(255, 0, 51, 0.28);
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    .nav-buttons button {
      border: none;
      cursor: pointer;
      color: white;
      font-weight: 900;
      width: 52px;
      height: 44px;
      padding: 0;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      transition: transform 0.25s ease, background 0.25s ease, border 0.25s ease;
    }

    .nav-buttons button:hover {
      transform: translateY(-3px);
      background: rgba(255,0,51,0.18);
      border-color: rgba(255,0,51,0.42);
    }

    .nav-buttons #todayMonth {
      width: auto;
      padding: 0 18px;
      background: linear-gradient(135deg, #ff0033, #6f0016);
      box-shadow: 0 14px 34px rgba(255, 0, 51, 0.22);
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      padding-bottom: 4px;
    }

    .day {
      min-height: 118px;
      border-radius: 18px;
      padding: 12px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
      transition: 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .day::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255, 0, 51, 0.13), transparent 60%);
      opacity: 0;
      transition: 0.25s ease;
      pointer-events: none;
    }

    .day:hover {
      transform: translateY(-4px) scale(1.015);
      border-color: rgba(255, 0, 51, 0.44);
      background: rgba(255,255,255,0.075);
      box-shadow: 0 18px 40px rgba(255, 0, 51, 0.12);
    }

    .day:hover::before {
      opacity: 1;
    }

    .day.empty {
      opacity: 0.22;
      pointer-events: none;
    }

    .day.today {
      border-color: rgba(255, 0, 51, 0.82);
      box-shadow:
        inset 0 0 0 1px rgba(255, 0, 51, 0.38),
        0 0 34px rgba(255, 0, 51, 0.15);
    }

    .day-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      margin-bottom: 9px;
      position: relative;
      z-index: 2;
    }

    .today-tag {
      font-size: 10px;
      color: #ffffff;
      background: linear-gradient(135deg, #ff0033, #850019);
      padding: 4px 7px;
      border-radius: 999px;
      box-shadow: 0 0 18px rgba(255, 0, 51, 0.38);
    }

    .event-chip {
      display: block;
      width: 100%;
      text-align: left;
      margin-top: 7px;
      padding: 8px 9px;
      border-radius: 12px;
      color: white;
      background:
        linear-gradient(135deg, rgba(255, 0, 51, 0.96), rgba(90, 0, 20, 0.92));
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: 0.25s ease;
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 28px rgba(255, 0, 51, 0.18);
    }

    .event-chip:hover {
      transform: scale(1.04);
      filter: brightness(1.18);
      box-shadow: 0 14px 34px rgba(255, 0, 51, 0.34);
    }

    .event-panel {
      padding: 24px;
      align-self: start;
      position: sticky;
      top: 20px;
    }

    .event-panel h2 {
      font-size: 22px;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .event-panel p {
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .event-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.11);
      transition: 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .event-item::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at left, rgba(255,0,51,0.18), transparent 55%);
      opacity: 0;
      transition: 0.25s ease;
    }

    .event-item:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.085);
      border-color: rgba(255,0,51,0.28);
    }

    .event-item:hover::before {
      opacity: 1;
    }

    .event-date,
    .event-name,
    .link-button {
      position: relative;
      z-index: 2;
    }

    .event-date {
      color: #ff6b82;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .event-name {
      font-weight: 900;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .link-button {
      width: 100%;
      border: none;
      cursor: pointer;
      color: white;
      font-weight: 900;
      border-radius: 13px;
      padding: 12px;
      background: linear-gradient(135deg, #ff0033, #690014);
      box-shadow: 0 14px 34px rgba(255, 0, 51, 0.24);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
    }

    .link-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.15);
      box-shadow: 0 20px 48px rgba(255, 0, 51, 0.38);
    }

    .empty-message {
      color: var(--muted);
      font-size: 14px;
      padding: 18px;
      border: 1px dashed rgba(255,0,51,0.28);
      border-radius: 16px;
      text-align: center;
      background: rgba(255,0,51,0.04);
    }

    @media (max-width: 960px) {
      .content {
        grid-template-columns: 1fr;
      }

      .event-panel {
        position: relative;
        top: auto;
      }

      .float-card {
        opacity: 0.28;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 22px, 1180px);
        padding-top: 20px;
      }

      .calendar-card,
      .event-panel {
        border-radius: 22px;
      }

      .calendar-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .weekdays {
        gap: 5px;
      }

      .calendar {
        gap: 7px;
      }

      .weekday {
        font-size: 10px;
      }

      .day {
        min-height: 92px;
        padding: 8px;
        border-radius: 14px;
      }

      .day-number {
        font-size: 13px;
      }

      .today-tag {
        display: none;
      }

      .event-chip {
        font-size: 10px;
        padding: 7px;
      }

      .stage-light {
        display: none;
      }

      .float-card {
        width: 110px;
        height: 62px;
        opacity: 0.20;
      }

      .cube {
        opacity: 0.22;
      }
    }

    @media (max-width: 420px) {
      .calendar-card {
        padding: 14px;
      }

      .weekdays,
      .calendar {
        gap: 5px;
      }

      .day {
        min-height: 78px;
        padding: 6px;
      }

      .event-chip {
        margin-top: 5px;
        font-size: 9px;
      }

      .top-title {
        width: 100%;
        justify-content: center;
        text-align: center;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="stage-light left"></div>
  <div class="stage-light right"></div>

  <div class="scene-3d">
    <div class="float-card one" data-text="VIP"></div>
    <div class="float-card two" data-text="LIVE"></div>
    <div class="float-card three" data-text="SHOW"></div>
    <div class="float-card four" data-text="PARTY"></div>

    <div class="cube one"></div>
    <div class="cube two"></div>
  </div>

  <main class="page">
    <div class="top-title">
      <span class="pulse-dot"></span>
      Agenda oficial de eventos - Maia Produtor
    </div>

    <section class="content">
      <div class="calendar-card">
        <div class="calendar-top">
          <h2 class="month-title" id="monthTitle">Agenda</h2>

          <div class="nav-buttons">
            <button id="prevMonth" aria-label="Mês anterior">‹</button>
            <button id="todayMonth" aria-label="Mês atual">Hoje</button>
            <button id="nextMonth" aria-label="Próximo mês">›</button>
          </div>
        </div>

        <div class="weekdays">
          <div class="weekday">Dom</div>
          <div class="weekday">Seg</div>
          <div class="weekday">Ter</div>
          <div class="weekday">Qua</div>
          <div class="weekday">Qui</div>
          <div class="weekday">Sex</div>
          <div class="weekday">Sáb</div>
        </div>

        <div class="calendar" id="calendar"></div>
      </div>

      <aside class="event-panel">
        <h2>Eventos do mês</h2>
        <p>Escolha um evento e acesse a página de vendas.</p>

        <div class="event-list" id="eventList"></div>
      </aside>
    </section>
  </main>

  <!-- Eventos centralizados: edite apenas o arquivo eventos.js -->
  <script src="eventos.js"></script>

  <script>
    const calendar = document.getElementById("calendar");
    const monthTitle = document.getElementById("monthTitle");
    const eventList = document.getElementById("eventList");

    const prevMonth = document.getElementById("prevMonth");
    const nextMonth = document.getElementById("nextMonth");
    const todayMonth = document.getElementById("todayMonth");

    const today = new Date();

    const monthNames = [
      "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
      "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    /*
      O calendário abre automaticamente no mês do primeiro evento.
      Se você quiser abrir no mês atual, substitua essas duas linhas por:
      let currentMonth = today.getMonth();
      let currentYear = today.getFullYear();
    */

    let firstEventDate = EVENTOS.length > 0 ? new Date(EVENTOS[0].start + "T12:00:00") : today;
    let currentMonth = firstEventDate.getMonth();
    let currentYear = firstEventDate.getFullYear();

    function formatDate(year, month, day) {
      const mm = String(month + 1).padStart(2, "0");
      const dd = String(day).padStart(2, "0");
      return `${year}-${mm}-${dd}`;
    }

    function formatDateBR(dateString) {
      const [year, month, day] = dateString.split("-");
      return `${day}/${month}/${year}`;
    }

    function getEventStart(event) {
      return event.start || event.date;
    }

    function getEventEnd(event) {
      return event.end || event.date || event.start;
    }

    function eventHappensOnDate(event, dateKey) {
      const start = getEventStart(event);
      const end = getEventEnd(event);

      return dateKey >= start && dateKey <= end;
    }

    function eventHappensInCurrentMonth(event) {
      const firstDayOfMonth = formatDate(currentYear, currentMonth, 1);
      const lastDayOfMonth = formatDate(
        currentYear,
        currentMonth,
        new Date(currentYear, currentMonth + 1, 0).getDate()
      );

      const start = getEventStart(event);
      const end = getEventEnd(event);

      return start <= lastDayOfMonth && end >= firstDayOfMonth;
    }

    function formatPeriodBR(event) {
      const start = getEventStart(event);
      const end = getEventEnd(event);

      if (start === end) {
        return formatDateBR(start);
      }

      return `${formatDateBR(start)} até ${formatDateBR(end)}`;
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      eventList.innerHTML = "";

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

      monthTitle.textContent = `${monthNames[currentMonth]} ${currentYear}`;

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        calendar.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = formatDate(currentYear, currentMonth, day);
        const dayEvents = EVENTOS.filter(event => eventHappensOnDate(event, dateKey));

        const dayBox = document.createElement("div");
        dayBox.className = "day";

        const isToday =
          day === today.getDate() &&
          currentMonth === today.getMonth() &&
          currentYear === today.getFullYear();

        if (isToday) {
          dayBox.classList.add("today");
        }

        dayBox.innerHTML = `
          <div class="day-number">
            <span>${day}</span>
            ${isToday ? `<span class="today-tag">Hoje</span>` : ""}
          </div>
        `;

        dayEvents.forEach(event => {
          const eventChip = document.createElement("a");
          eventChip.href = event.link;
          eventChip.target = "_blank";
          eventChip.rel = "noopener noreferrer";
          eventChip.className = "event-chip";
          eventChip.textContent = event.name;
          dayBox.appendChild(eventChip);
        });

        calendar.appendChild(dayBox);
      }

      renderEventList();
    }

    function renderEventList() {
      const filteredEvents = EVENTOS
        .filter(event => eventHappensInCurrentMonth(event))
        .sort((a, b) => getEventStart(a).localeCompare(getEventStart(b)));

      if (filteredEvents.length === 0) {
        eventList.innerHTML = `
          <div class="empty-message">
            Nenhum evento cadastrado neste mês.
          </div>
        `;
        return;
      }

      filteredEvents.forEach(event => {
        const item = document.createElement("div");
        item.className = "event-item";

        item.innerHTML = `
          <div class="event-date">${formatPeriodBR(event)}</div>
          <div class="event-name">${event.name}</div>

          <a class="link-button" href="${event.link}" target="_blank" rel="noopener noreferrer">
            Abrir página de vendas
          </a>
        `;

        eventList.appendChild(item);
      });
    }

    prevMonth.addEventListener("click", () => {
      currentMonth--;

      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }

      renderCalendar();
    });

    nextMonth.addEventListener("click", () => {
      currentMonth++;

      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }

      renderCalendar();
    });

    todayMonth.addEventListener("click", () => {
      currentMonth = today.getMonth();
      currentYear = today.getFullYear();
      renderCalendar();
    });

    renderCalendar();
  </script>
</body>
</html>
